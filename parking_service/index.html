<!DOCTYPE html>
<html>
<head>
  <title>Parking Map</title>
</head>
<body>

<h2>🚗 Parking Map</h2>
<div id="map"></div>
<h3 id="stats"></h3>


<h3>📜 Моя история</h3>
<ul id="history"></ul>



<script>
const ws = new WebSocket("ws://localhost:8080/ws");

const spots = {};
const mapDiv = document.getElementById("map");
let mySpot = null;

// ⚠️ ВСТАВЬ СЮДА СВОЙ JWT ТОКЕН
const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3NzQ0NTAwMTMsInJvbGUiOiJVU0VSIiwidXNlcl9pZCI6MX0.sYwQXGJrSsOB9CsOcYotO-eBYd9vl4Biy3Y8NjEGLUY";

// 🔥 СОЗДАЁМ МЕСТА
for (let i = 1; i <= 15; i++) {
  const el = document.createElement("div");

  el.id = "spot-" + i;
  el.innerText = i;
  el.style.width = "50px";
  el.style.height = "50px";
  el.style.margin = "5px";
  el.style.display = "inline-block";
  el.style.textAlign = "center";
  el.style.lineHeight = "50px";
  el.style.border = "1px solid black";
  el.style.background = "green";
  el.style.cursor = "pointer";

el.onclick = async () => {
  const status = spots[i];

  try {
    let response;

    // 🔥 ЕСЛИ СВОЁ МЕСТО → освобождаем
    if (i === mySpot) {
      response = await fetch(`http://localhost:8080/release/${i}`, {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + TOKEN
        }
      });

      if (response.ok) {
        mySpot = null;
      }

      return;
    }

    // 🔥 ЕСЛИ ЧУЖОЕ ЗАНЯТО
    if (status === "OCCUPIED") {
      alert("Место занято");
      return;
    }

    // 🔥 ЕСЛИ СВОБОДНОЕ → резервируем
    if (status === "FREE") {

      // если уже есть место — освобождаем старое
      if (mySpot !== null) {
        await fetch(`http://localhost:8080/release/${mySpot}`, {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + TOKEN
          }
        });
      }

      response = await fetch(`http://localhost:8080/reserve/${i}`, {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + TOKEN
        }
      });

      if (response.ok) {
        mySpot = i;
      }
    }

  } catch (err) {
    alert("Ошибка сети");
  }
};

  mapDiv.appendChild(el);
  spots[i] = "FREE";
}

// 🔥 ОБНОВЛЕНИЯ ЧЕРЕЗ WS
ws.onmessage = (event) => {
  const data = JSON.parse(event.data);

  const spotId = data.spot_id;
  const isOccupied = data.type == 0;

  spots[spotId] = isOccupied ? "OCCUPIED" : "FREE";

  const el = document.getElementById("spot-" + spotId);

  if (isOccupied) {
    if (spotId === mySpot) {
      el.style.background = "blue";
    } else {
      el.style.background = "red";
    }
  } else {
    el.style.background = "green";
  }
};


async function loadStats() {
  const res = await fetch("http://localhost:8080/stats");
  const data = await res.json();

  document.getElementById("stats").innerText =
    `Всего: ${data.total_spots}, Свободно: ${data.free}, Занято: ${data.occupied}`;
}

setInterval(loadStats, 2000);
loadStats();


async function loadHistory() {
  const res = await fetch("http://localhost:8080/my/history", {
    headers: {
      "Authorization": "Bearer " + TOKEN
    }
  });

  const data = await res.json();

  const list = document.getElementById("history");
  list.innerHTML = "";

  data.forEach(item => {
    const li = document.createElement("li");
    li.innerText = `Место ${item.spot_id}: ${item.start_time} → ${item.end_time || "..."}`;
    list.appendChild(li);
  });
}

setInterval(loadHistory, 3000);
loadHistory();

</script>

</body>
</html>
