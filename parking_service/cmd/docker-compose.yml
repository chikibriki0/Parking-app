version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: parking_postgres
    restart: always
    environment:
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking
      POSTGRES_DB: parking_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: parking_backend
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://parking:parking@postgres:5432/parking_service?sslmode=disable

volumes:
  postgres_data: