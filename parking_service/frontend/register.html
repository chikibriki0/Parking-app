<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация | Parking Service</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
<div id="pageLoader" class="page-loader hidden">
  <div class="loader-box">
    <div class="spinner"></div>
    <div class="loader-text" id="loaderText">Загрузка...</div>
  </div>
</div>
  <div id="toastContainer" class="toast-container"></div>
  <div class="auth-container">
    <div class="auth-card">
      <h1>📝 Parking Service</h1>
      <p class="subtitle">Создание аккаунта в системе парковки</p>

      <form id="registerForm">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Пароль" required />
        <button type="submit">Зарегистрироваться</button>
      </form>

      <p id="registerError" class="error-text"></p>

      <p class="auth-switch">
        Уже есть аккаунт?
        <a href="login.html">Войти</a>
      </p>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
